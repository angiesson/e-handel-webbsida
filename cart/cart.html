<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stepify | Cart</title>

  <link rel="stylesheet" href="cart.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Funnel+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

<body>

  <!-- HEADER -->
  <header>
    <h1 class="cormorant-garamond-regular">
      <a href="../homepage/homepage.html">Stepify</a>
    </h1>

    <nav class="cormorant-garamond-regular">
      <a href="men.html">MEN</a>
      <a href="women.html">WOMEN</a>
      <a href="kids.html">KIDS</a>
      <a href="about.html">ABOUT US</a>
    </nav>

    <div class="icons">
      <a href="../search-page/search-page.html"><i class="fa-solid fa-magnifying-glass"></i></a>
      <a href="account.html"><i class="fa-regular fa-user"></i></a>
      <a href="favorites.html"><i class="fa-regular fa-heart"></i></a>
      <a href="cart.html">
        <a href="cart.html"><i class="fa-solid fa-basket-shopping"></i> <span id="cart-count">0</span></a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="cart-page">
    <section class="cart-left">
      <h2 id="cart-title">Your Cart (0 Products)</h2>
      <div id="cart-items"></div>
    </section>

    <aside class="cart-summary">
      <h3>Order Summary</h3>

      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">0 KR</span>
      </div>

      <div class="summary-row">
        <span>Delivery</span>
        <span id="delivery">49 KR</span>
      </div>

      <div class="summary-row total-row">
        <span>Total</span>
        <span id="total">49 KR</span>
      </div>

      <button id="checkout-btn" class="checkout-btn">GO TO CHECKOUT</button>
    </aside>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-links">
      <a href="#">SHOPS</a>
      <a href="#">CONTACT</a>
      <a href="#">FAQ</a>
    </div>

    <div class="footer-payments">
      <i class="fa-brands fa-cc-visa"></i>
      <i class="fa-brands fa-cc-mastercard"></i>
      <i class="fa-brands fa-cc-apple-pay"></i>
    </div>

    <div class="socialmedia">
      <i class="fa-brands fa-facebook"></i>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-tiktok"></i>
    </div>

    <div class="footer-copy">
      <p>© 2026 Stepify</p>
    </div>
  </footer>

  <script src="cart.js"></script>
</body>

</html>
