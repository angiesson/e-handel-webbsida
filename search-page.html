<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  <title></title>
    <link rel="stylesheet" href="search-page.css" />
</head>
<body>
<header class="site-header">
    <h1 class="cormorant-garamond-regular"><a href="homepage.html">Stepify</a></h1>

        <nav class="cormorant-garamond-regular">
            <a href="#">MEN</a>
            <a href="#">WOMEN</a>
            <a href="#">KIDS</a>
            <a href="#">ABOUT US</a>
        </nav>

        <div class="icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-user"></i>
            <i class="fa-regular fa-heart"></i>
            <a href="cart.html" aria-label="Varukorg"><i class="fa-solid fa-basket-shopping"></i></a>
        </div>
    </header>
<input class="search-input" type="search" placeholder="Sök skor" />

<main class="layout">
    <aside class="filters" aria-label="Filter">
        <h2>Filtrera</h2>

    <section class="filter-block">
    <h3>Färg</h3>
    <label class="color-option">
        <input class="color-input" type="checkbox" name="color" value="svart" />
        <span class="color-swatch swatch-black" aria-hidden="true"></span>
        <span>Svart</span>
    </label>
    <label class="color-option">
        <input class="color-input" type="checkbox" name="color" value="vit" />
        <span class="color-swatch swatch-white" aria-hidden="true"></span>
        <span>Vit</span>
    </label>
    <label class="color-option">
        <input class="color-input" type="checkbox" name="color" value="blå" />
        <span class="color-swatch swatch-blue" aria-hidden="true"></span>
        <span>Blå</span>
    </label>
    </section>


<section class="filter-block">
    <h3>Pris</h3>
    <label>Min:
        <input type="number" name="priceMin" placeholder="0" min="0">
    </label>
    <label>Max:
        <input type="number" name="priceMax" placeholder="5000" min="0">
    </label>
</section>


<section class="filter-block">
    <h3>Märke</h3>
    <select name="brand">
        <option value="">Alla</option>
        <option value="nike">Nike</option>
        <option value="adidas">Adidas</option>
        <option value="ugg">Ugg</option>
        <option value="newbalance">New Balance</option>
    </select>
</section>


<section class="filter-block">
    <h3>Storlek</h3>
    <div class="size-grid">
    <label><input type="checkbox" name="size" value="36" /> 36</label>
    <label><input type="checkbox" name="size" value="37" /> 37</label>
    <label><input type="checkbox" name="size" value="38" /> 38</label>
    <label><input type="checkbox" name="size" value="39" /> 39</label>
    <label><input type="checkbox" name="size" value="40" /> 40</label>
    <label><input type="checkbox" name="size" value="41" /> 41</label>
    <label><input type="checkbox" name="size" value="42" /> 42</label>
    <label><input type="checkbox" name="size" value="43" /> 43</label>
    <label><input type="checkbox" name="size" value="44" /> 44</label>
    <label><input type="checkbox" name="size" value="45" /> 45</label>
    <label><input type="checkbox" name="size" value="46" /> 46</label>
    <label><input type="checkbox" name="size" value="46" /> 47</label>
    <label><input type="checkbox" name="size" value="46" /> 48</label>
    </div>
</section>
    
<button class="clear-btn" type="button">Rensa filter</button>
    </aside>

<section class ="results"  aria-label="Resultat">
   <div class="results-header">
    <h2>Resultat</h2>
    <p class="result-counts">Visar: <strong>0</strong> produkter</p>
  </div>

  <div class="product-grid">
  </div>
</section>
</main>
<footer>
        <div class="footer-links">
            <a href="#">SHOPS</a>
            <a href="#">CONTACT</a>
            <a href="#">FAQ</a>
        </div>

        <div class="footer-payments">
            <i class="fa-brands fa-cc-visa"></i>
            <i class="fa-brands fa-cc-mastercard"></i>
            <i class="fa-brands fa-cc-apple-pay"></i>
        </div>


        <div class="socialmedia">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-tiktok"></i>
        </div>


        <div class="footer-copy">
            <p>© 2026 Stepify</p>
        </div>

    </footer>
<script src="search-page.js"></script>
</body>
</html>
